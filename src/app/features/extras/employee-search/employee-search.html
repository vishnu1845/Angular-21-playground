<div class="container">
    <input type="text" class="form-control me-2" placeholder="Searching...." (input)="onSearch($event)">

    <ul class="list-group mt-3">
        @for (emp of filteredEmployee(); track emp.id) {
            <li class="list-group-item">
                {{emp.id}} - {{emp.name}} - {{emp.role}}
            </li>
        }
    </ul>
</div>
