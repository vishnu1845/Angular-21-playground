<div class="container mt-3">
  <div class="row justify-content-center">
    <div class="col-md-5">

      <h4 class="mb-4 row justify-content-center" >Register Form</h4>

        <form [formGroup]="form" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label for="userName" class="form-label">Username</label>
                <input type="text" class="form-control" formControlName="userName" placeholder="userName">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" formControlName="email" placeholder="email">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" formControlName="password" placeholder="password">
            </div>

            <button type="submit" class="mt-4 btn btn-primary w-100">Submit</button>
        </form>
    </div>
 </div>
</div>
