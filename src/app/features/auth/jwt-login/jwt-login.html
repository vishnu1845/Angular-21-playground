<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card shadow-sm" style="width: 100%; max-width: 400px;">
    <div class="card-body p-4">
      <h4 class="card-title text-center mb-4">🔐 JWT Login</h4>

      <!-- Error alert -->
      @if (errorMsg()) {
        <div class="alert alert-danger py-2">{{ errorMsg() }}</div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input
            type="email"
            class="form-control"
            formControlName="email"
            [class.is-invalid]="form.controls.email.touched && form.controls.email.invalid"
          />
          <div class="invalid-feedback">Valid email is required.</div>
        </div>

        <!-- Password -->
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            formControlName="password"
            [class.is-invalid]="form.controls.password.touched && form.controls.password.invalid"
          />
          <div class="invalid-feedback">Password is required.</div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading()">
          @if (loading()) {
            <span class="spinner-border spinner-border-sm me-2"></span> Logging in...
          } @else {
            Login
          }
        </button>
      </form>
    </div>
  </div>
</div>
